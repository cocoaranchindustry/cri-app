# Nixpacks build configuration — Cocoa Ranch & Industry
# https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ["nodejs-20_x", "npm-10_x"]

[phases.install]
cmds = [
  "npm ci --include=dev --workspaces --include-workspace-root"
]

[phases.build]
cmds = [
  "npm run build --workspace=apps/web"
]

[start]
cmd = "npm run start --workspace=apps/web"

# Variables d'environnement par défaut (à surcharger dans le dashboard Railway)
[variables]
NODE_ENV = "production"
NEXT_TELEMETRY_DISABLED = "1"
NIXPACKS_NODE_VERSION = "20"
NIXPACKS_NPM_VERSION = "10"
PORT = "3000"
HOSTNAME = "0.0.0.0"
