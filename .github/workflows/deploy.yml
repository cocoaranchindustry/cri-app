name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environnement cible"
        required: true
        type: choice
        default: production
        options:
          - staging
          - production

env:
  NODE_VERSION: 20

jobs:
  # ─── Tests E2E (Playwright) ─────────────────────────────────────────────
  test-e2e:
    name: Tests E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Installer Playwright
        run: npx playwright install --with-deps chromium

      - name: Lancer les tests E2E
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/

  # ─── Déploiement Vercel ─────────────────────────────────────────────────
  deploy-vercel:
    name: Déploiement Vercel
    runs-on: ubuntu-latest
    needs: [test-e2e]
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Déployer sur Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: ${{ github.event.inputs.environment == 'staging' && '' || '--prod' }}
          working-directory: apps/web

  # ─── Déploiement Firebase Rules & Functions ─────────────────────────────
  deploy-firebase:
    name: Déploiement Firebase (rules + functions)
    runs-on: ubuntu-latest
    needs: [test-e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installer Firebase CLI
        run: npm install -g firebase-tools

      - name: Auth Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Déployer Firestore Rules + Indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_ID }}
        continue-on-error: false

      - name: Déployer Storage Rules
        run: firebase deploy --only storage --project ${{ secrets.FIREBASE_PROJECT_ID }}
        continue-on-error: false

      - name: Déployer Cloud Functions
        run: |
          cd functions
          npm ci
          npm run build
          firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }}
        continue-on-error: false
