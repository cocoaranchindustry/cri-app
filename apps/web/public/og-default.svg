<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14322B"/>
      <stop offset="50%" stop-color="#1F4A2E"/>
      <stop offset="100%" stop-color="#2D6B3E"/>
    </linearGradient>
    <radialGradient id="og-orb1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#D4A024" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D4A024" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-orb2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#9C4A1A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9C4A1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fond -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-orb1)"/>
  <rect width="1200" height="630" fill="url(#og-orb2)"/>

  <!-- Pattern fève cacao subtil -->
  <g opacity="0.08">
    <circle cx="200" cy="150" r="60" fill="none" stroke="#D4A024" stroke-width="2"/>
    <circle cx="200" cy="150" r="30" fill="none" stroke="#D4A024" stroke-width="2"/>
    <circle cx="900" cy="500" r="60" fill="none" stroke="#9C4A1A" stroke-width="2"/>
    <circle cx="900" cy="500" r="30" fill="none" stroke="#9C4A1A" stroke-width="2"/>
    <circle cx="1050" cy="100" r="50" fill="none" stroke="#D4A024" stroke-width="2"/>
    <circle cx="100" cy="500" r="50" fill="none" stroke="#9C4A1A" stroke-width="2"/>
  </g>

  <!-- Logo cabosse -->
  <g transform="translate(160 230)">
    <circle cx="0" cy="0" r="100" fill="#D4A024"/>
    <g transform="translate(0 0)">
      <ellipse cx="0" cy="10" rx="48" ry="60" fill="#7A3812"/>
      <path d="M -40 -35 Q -36 10 -40 60" fill="none" stroke="#5A2A0E" stroke-width="3" stroke-linecap="round"/>
      <path d="M -18 -48 Q -14 10 -18 70" fill="none" stroke="#5A2A0E" stroke-width="3" stroke-linecap="round"/>
      <path d="M 0 -52 Q 0 10 0 70" fill="none" stroke="#5A2A0E" stroke-width="3" stroke-linecap="round"/>
      <path d="M 18 -48 Q 14 10 18 70" fill="none" stroke="#5A2A0E" stroke-width="3" stroke-linecap="round"/>
      <path d="M 40 -35 Q 36 10 40 60" fill="none" stroke="#5A2A0E" stroke-width="3" stroke-linecap="round"/>
      <path d="M 0 -50 L 0 -65" stroke="#1F4A2E" stroke-width="6" stroke-linecap="round"/>
      <path d="M 0 -65 Q -22 -75 -32 -60 Q -18 -55 0 -65 Z" fill="#1F4A2E"/>
      <path d="M 0 -65 Q 22 -75 32 -60 Q 18 -55 0 -65 Z" fill="#2D6B3E"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(310 280)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="84" font-weight="900" fill="#F5EFE0">
      COCOA <tspan font-style="italic" fill="#D4A024">RANCH</tspan>
    </text>
    <text x="0" y="50" font-family="Calibri, sans-serif" font-size="28" font-weight="700" fill="#D4A024" letter-spacing="6">
      &amp; INDUSTRY
    </text>
    <line x1="0" y1="70" x2="80" y2="70" stroke="#D4A024" stroke-width="3"/>
    <text x="0" y="100" font-family="Calibri, sans-serif" font-size="18" font-weight="600" fill="#F5EFE0" opacity="0.7" letter-spacing="3">
      AGRO-PME FONDATION · DEPUIS 2010
    </text>
  </g>

  <!-- Tagline + N°1 -->
  <g transform="translate(310 460)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="40" font-weight="900" fill="#D4A024" font-style="italic">
      N°1 du cacao camerounais
    </text>
    <text x="0" y="40" font-family="Calibri, sans-serif" font-size="22" font-weight="500" fill="#F5EFE0" opacity="0.85">
      Cacao premium zéro déforestation · Provendes brevetées · 5 000 producteurs
    </text>
  </g>

  <!-- Mention Cameroun -->
  <text x="600" y="600" text-anchor="middle" font-family="Calibri, sans-serif" font-size="16" font-weight="700" fill="#D4A024" letter-spacing="4">
    CAMEROUN · BASSIN DU MUNGO
  </text>
</svg>
